services:
  db:
    image: postgres:15-alpine
    container_name: budgetnest_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: budgetnest
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"

  back:
    build: ./back
    container_name: budgetnest_back
    ports:
      - "3000:3000"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: budgetnest
      DB_HOST: db
      DB_PORT: 5432
      JWT_SECRET: budget_secret_2026
    depends_on:
      - db
    restart: always

  front:
    build: ./front
    container_name: budgetnest_front
    ports:
      - "8080:80"
    depends_on:
      - back